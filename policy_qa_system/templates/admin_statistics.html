<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #c41e3a 0%, #d4a017 100%);
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(196, 30, 58, 0.3);
        }
        .stat-card h4 {
            margin-bottom: 15px;
            font-size: 16px;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>📊 数据统计</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>📈 系统数据概览</h2>
                <div id="statistics" class="stats-grid">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadStatistics() {
            try {
                const response = await fetch('/api/statistics');
                const stats = await response.json();
                const statisticsDiv = document.getElementById('statistics');
                
                statisticsDiv.innerHTML = `
                    <div class="stat-card">
                        <h4>📚 政策数量</h4>
                        <div class="number">${stats.policy_count}</div>
                    </div>
                    <div class="stat-card">
                        <h4>👥 用户数量</h4>
                        <div class="number">${stats.user_count}</div>
                    </div>
                    <div class="stat-card">
                        <h4>👑 管理员数量</h4>
                        <div class="number">${stats.admin_count}</div>
                    </div>
                    <div class="stat-card">
                        <h4>💬 问答历史</h4>
                        <div class="number">${stats.history_count}</div>
                    </div>
                    <div class="stat-card">
                        <h4>⭐ 收藏数量</h4>
                        <div class="number">${stats.favorite_count}</div>
                    </div>
                `;
            } catch (error) {
                showMessage('加载数据统计失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadStatistics();
    </script>
</body>
</html>
