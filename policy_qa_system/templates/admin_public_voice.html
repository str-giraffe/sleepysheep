<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民声管理 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .section-divider {
            border-top: 2px solid #eee;
            margin: 30px 0;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>🗣️ 民声管理</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>⚙️ 民声设置</h2>
                <form id="publicVoiceSettingsForm" onsubmit="updatePublicVoiceSettings(event)">
                    <div class="form-group">
                        <label>最小浏览量</label>
                        <input type="number" id="minViewCount" required min="1">
                    </div>
                    <div class="form-group">
                        <label>最小点赞量</label>
                        <input type="number" id="minLikeCount" required min="1">
                    </div>
                    <button type="submit" class="btn">更新设置</button>
                </form>
                <div id="settingChangesList" class="policy-list" style="margin-top: 20px;">
                    <h3>设置更改记录</h3>
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📋 可推举主题</h2>
                <div id="endorseableTopicsList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <div class="card">
                <h2>📢 已发布民声</h2>
                <div id="publicVoicesList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadPublicVoiceSettings() {
            try {
                const response = await fetch('/api/public-voice/settings');
                const settings = await response.json();
                document.getElementById('minViewCount').value = settings.min_view_count;
                document.getElementById('minLikeCount').value = settings.min_like_count;
            } catch (error) {
                showMessage('加载民声设置失败：' + error.message, 'error');
            }
        }
        
        async function updatePublicVoiceSettings(event) {
            event.preventDefault();
            const minViewCount = parseInt(document.getElementById('minViewCount').value);
            const minLikeCount = parseInt(document.getElementById('minLikeCount').value);
            
            try {
                const response = await fetch('/api/public-voice/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ min_view_count: minViewCount, min_like_count: minLikeCount })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadSettingChanges();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('更新民声设置失败：' + error.message, 'error');
            }
        }
        
        async function loadSettingChanges() {
            try {
                const response = await fetch('/api/public-voice/setting-changes');
                const changes = await response.json();
                const listDiv = document.getElementById('settingChangesList');
                
                if (changes.length === 0) {
                    listDiv.innerHTML = '<h3>设置更改记录</h3><div class="empty-state">暂无更改记录。</div>';
                    return;
                }

                listDiv.innerHTML = '<h3>设置更改记录</h3>' + changes.map(change => `
                    <div class="policy-item">
                        <h3>更改记录 #${change.id}</h3>
                        <div class="meta">
                            管理员：${escapeHtml(change.admin_username)} | 
                            更改时间：${change.created_at}
                        </div>
                        <div class="content-preview">
                            <strong>最小浏览量：</strong>${change.old_min_view_count} → ${change.new_min_view_count}<br>
                            <strong>最小点赞量：</strong>${change.old_min_like_count} → ${change.new_min_like_count}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('加载设置更改记录失败：' + error.message, 'error');
            }
        }
        
        async function loadEndorseableTopics() {
            try {
                const response = await fetch('/api/public-voice/endorseable-topics');
                const topics = await response.json();
                const listDiv = document.getElementById('endorseableTopicsList');
                
                if (topics.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">暂无符合条件的讨论主题。</div>';
                    return;
                }

                listDiv.innerHTML = topics.map(topic => `
                    <div class="policy-item">
                        <h3>${escapeHtml(topic.title)}</h3>
                        <div class="meta">
                            发布者：${escapeHtml(topic.nickname)} | 
                            浏览量：${topic.view_count} | 
                            点赞量：${topic.like_count} | 
                            发布时间：${topic.created_at}
                        </div>
                        <div class="content-preview">${escapeHtml(topic.content)}</div>
                        <div class="actions" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                            <button class="btn btn-success btn-sm" onclick="endorseTopic(${topic.id}, 1)">推举</button>
                            <button class="btn btn-danger btn-sm" onclick="endorseTopic(${topic.id}, -1)">不推举</button>
                            <button class="btn btn-secondary btn-sm" onclick="getTopicEndorsements(${topic.id})">查看推举情况</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('加载可推举主题失败：' + error.message, 'error');
            }
        }
        
        async function endorseTopic(topicId, endorsement) {
            try {
                const response = await fetch(`/api/public-voice/endorsements/${topicId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ endorsement })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadEndorseableTopics();
                    loadPublicVoices();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('推举操作失败：' + error.message, 'error');
            }
        }
        
        async function getTopicEndorsements(topicId) {
            try {
                const response = await fetch(`/api/public-voice/endorsements/${topicId}`);
                const endorsements = await response.json();
                
                let message = '推举情况：\n';
                if (endorsements.length === 0) {
                    message += '暂无推举记录';
                } else {
                    endorsements.forEach(endorsement => {
                        message += `管理员ID: ${endorsement.admin_id} - ${endorsement.endorsement === 1 ? '推举' : '不推举'} (${endorsement.created_at})\n`;
                    });
                }
                alert(message);
            } catch (error) {
                showMessage('获取推举情况失败：' + error.message, 'error');
            }
        }
        
        async function loadPublicVoices() {
            try {
                const response = await fetch('/api/public-voice/voices');
                const voices = await response.json();
                const listDiv = document.getElementById('publicVoicesList');
                
                if (voices.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">暂无民声内容。</div>';
                    return;
                }

                listDiv.innerHTML = voices.map(voice => `
                    <div class="policy-item">
                        <h3>${escapeHtml(voice.title)}</h3>
                        <div class="meta">
                            浏览量：${voice.view_count} | 
                            点赞量：${voice.like_count} | 
                            发布时间：${voice.published_at}
                        </div>
                        <div class="content-preview">${escapeHtml(voice.content)}</div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('加载民声内容失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadPublicVoiceSettings();
        loadSettingChanges();
        loadEndorseableTopics();
        loadPublicVoices();
    </script>

    <script>
        // 侧边栏交互功能
        let sidebarTimeout;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');

            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                toggle.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                toggle.classList.add('active');
            }
        }

        function showSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.add('active');
            toggle.classList.add('active');
        }

        function hideSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.remove('active');
            toggle.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');

            sidebar.addEventListener('mouseenter', function() {
                clearTimeout(sidebarTimeout);
                showSidebar();
            });

            sidebar.addEventListener('mouseleave', function() {
                sidebarTimeout = setTimeout(hideSidebar, 300);
            });

            document.addEventListener('click', function(e) {
                if (!sidebar.contains(e.target) && !e.target.matches('.sidebar-toggle')) {
                    hideSidebar();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hideSidebar();
                }
            });
        });
    </script>

</body>
</html>
