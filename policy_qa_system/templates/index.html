<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .nav {
            display: flex;
            justify-content: flex-end;
            padding: 15px 30px;
            background: #f5f5f5;
        }
        .nav a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 30px;
        }
        .input-section {
            margin-bottom: 30px;
        }
        .input-section textarea {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        .input-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .answer-section {
            margin-top: 30px;
        }
        .answer-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .answer-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .chunks-section {
            margin-top: 30px;
        }
        .chunks-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .chunk-item {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ffc107;
            font-size: 14px;
            line-height: 1.6;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ 政策问答系统</h1>
            <p>基于 RAG 技术的智能政策咨询助手</p>
        </div>
        <div class="nav">
            <a href="/admin">管理后台 →</a>
        </div>
        <div class="content">
            <div class="input-section">
                <textarea id="question" placeholder="请输入您的问题，例如：最新的税收优惠政策是什么？"></textarea>
                <br><br>
                <button class="btn" id="askBtn" onclick="askQuestion()">提问</button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) {
                alert('请输入问题');
                return;
            }

            const askBtn = document.getElementById('askBtn');
            askBtn.disabled = true;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在思考中...</div>';

            try {
                const response = await fetch('/api/qa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                
                if (response.ok) {
                    let html = '<div class="answer-section">';
                    html += '<h3>💡 回答</h3>';
                    html += '<div class="answer-box">' + escapeHtml(data.answer) + '</div>';
                    html += '</div>';

                    if (data.chunks && data.chunks.length > 0) {
                        html += '<div class="chunks-section">';
                        html += '<h3>📚 参考内容</h3>';
                        data.chunks.forEach((chunk, index) => {
                            html += '<div class="chunk-item"><strong>片段 ' + (index + 1) + ':</strong><br>' + escapeHtml(chunk) + '</div>';
                        });
                        html += '</div>';
                    }

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="error">错误：' + escapeHtml(data.error) + '</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="error">请求失败：' + escapeHtml(error.message) + '</div>';
            }

            askBtn.disabled = false;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                askQuestion();
            }
        });
    </script>
</body>
</html>
