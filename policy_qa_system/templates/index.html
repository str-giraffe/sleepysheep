<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策问答系统</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- 侧边导航栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/" class="active">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                {% if user_info.role == 'admin' %}
                <li><a href="/admin">管理后台</a></li>
                {% endif %}
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <!-- 主内容区域 -->
    <div class="main-container">
        <div class="container">
            <div class="header">
                <h1>🏛️ 政策问答系统</h1>
                <p>基于 RAG 技术的智能政策咨询助手</p>
            </div>
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        {% if user_info.region %}
                        <span style="color: #666; font-size: 14px;">({{ user_info.region }})</span>
                        {% endif %}
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div class="content">
                <div class="input-section">
                    <textarea id="question" placeholder="请输入您的问题，例如：最新的税收优惠政策是什么？"></textarea>
                    <br><br>
                    <button class="btn" id="askBtn" onclick="askQuestion()">提问</button>
                </div>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>
        async function askQuestion() {
            const question = document.getElementById('question').value.trim();
            if (!question) {
                alert('请输入问题');
                return;
            }

            const askBtn = document.getElementById('askBtn');
            askBtn.disabled = true;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在思考中...</div>';

            try {
                const response = await fetch('/api/qa', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                
                if (response.ok) {
                    let html = '<div class="answer-section">';
                    html += '<h3>💡 回答</h3>';
                    html += '<div class="answer-box">' + escapeHtml(data.answer) + '</div>';
                    html += '</div>';

                    if (data.chunks && data.chunks.length > 0) {
                        html += '<div class="chunks-section">';
                        html += '<h3>📚 参考内容</h3>';
                        data.chunks.forEach((chunk, index) => {
                            html += '<div class="chunk-item"><strong>片段 ' + (index + 1) + ':</strong><br>' + escapeHtml(chunk) + '</div>';
                        });
                        html += '</div>';
                    }

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="error">错误：' + escapeHtml(data.error) + '</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="error">请求失败：' + escapeHtml(error.message) + '</div>';
            }

            askBtn.disabled = false;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('question').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                askQuestion();
            }
        });
    </script>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            // 触发CSS过渡效果
            setTimeout(() => {
                sidebar.style.left = '-230px';
            }, 10);
        }
    </script>
</body>
</html>
