<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签管理 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>🔖 标签管理</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>➕ 添加标签</h2>
                <form id="addTagForm" onsubmit="addTag(event)">
                    <div class="form-group">
                        <label>标签名称 *</label>
                        <input type="text" id="tagName" required placeholder="请输入标签名称">
                    </div>
                    <button type="submit" class="btn">添加标签</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 标签列表</h2>
                <div id="tagList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadTags() {
            try {
                const response = await fetch('/api/tags');
                const tags = await response.json();
                const tagList = document.getElementById('tagList');
                
                if (tags.length === 0) {
                    tagList.innerHTML = '<div class="empty-state">暂无标签，请添加。</div>';
                } else {
                    tagList.innerHTML = tags.map(tag => `
                        <div class="policy-item">
                            <h3>${escapeHtml(tag.name)}</h3>
                            <div class="meta">创建时间：${tag.created_at}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                showMessage('加载标签列表失败：' + error.message, 'error');
            }
        }

        async function addTag(event) {
            event.preventDefault();
            
            const name = document.getElementById('tagName').value.trim();
            
            try {
                const response = await fetch('/api/tags', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    document.getElementById('addTagForm').reset();
                    loadTags();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('添加标签失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadTags();
    </script>

    <script>
        // 侧边栏交互功能
        let sidebarTimeout;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');

            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                toggle.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                toggle.classList.add('active');
            }
        }

        function showSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.add('active');
            toggle.classList.add('active');
        }

        function hideSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.remove('active');
            toggle.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');

            sidebar.addEventListener('mouseenter', function() {
                clearTimeout(sidebarTimeout);
                showSidebar();
            });

            sidebar.addEventListener('mouseleave', function() {
                sidebarTimeout = setTimeout(hideSidebar, 300);
            });

            document.addEventListener('click', function(e) {
                if (!sidebar.contains(e.target) && !e.target.matches('.sidebar-toggle')) {
                    hideSidebar();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hideSidebar();
                }
            });
        });
    </script>

</body>
</html>
