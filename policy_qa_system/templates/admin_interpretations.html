<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家解读管理 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>📝 专家解读管理</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>📋 待审核专家解读</h2>
                <div id="interpretationList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadPendingInterpretations() {
            try {
                const response = await fetch('/api/admin/interpretations/pending');
                const interpretations = await response.json();
                const listDiv = document.getElementById('interpretationList');
                
                if (interpretations.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">暂无待审核的专家解读。</div>';
                    return;
                }

                listDiv.innerHTML = interpretations.map(interpretation => `
                    <div class="policy-item">
                        <h3>${escapeHtml(interpretation.title)}</h3>
                        <div class="meta">
                            专家：${interpretation.nickname || interpretation.username} | 
                            提交时间：${interpretation.created_at}
                        </div>
                        <div class="content-preview">${escapeHtml(interpretation.content)}</div>
                        <div class="actions" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                            <button class="btn btn-success btn-sm" onclick="approveInterpretation(${interpretation.id})">批准</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectInterpretation(${interpretation.id})">拒绝</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('加载待审核解读列表失败：' + error.message, 'error');
            }
        }
        
        async function approveInterpretation(interpretationId) {
            if (!confirm('确定要批准该专家解读吗？')) return;
            
            try {
                const response = await fetch(`/api/admin/interpretations/${interpretationId}/approve`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadPendingInterpretations();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('批准解读失败：' + error.message, 'error');
            }
        }
        
        async function rejectInterpretation(interpretationId) {
            if (!confirm('确定要拒绝该专家解读吗？')) return;
            
            try {
                const response = await fetch(`/api/admin/interpretations/${interpretationId}/reject`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadPendingInterpretations();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('拒绝解读失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadPendingInterpretations();
    </script>

    <script>
        // 侧边栏交互功能
        let sidebarTimeout;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');

            if (sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
                toggle.classList.remove('active');
            } else {
                sidebar.classList.add('active');
                toggle.classList.add('active');
            }
        }

        function showSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.add('active');
            toggle.classList.add('active');
        }

        function hideSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.remove('active');
            toggle.classList.remove('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const sidebar = document.getElementById('sidebar');

            sidebar.addEventListener('mouseenter', function() {
                clearTimeout(sidebarTimeout);
                showSidebar();
            });

            sidebar.addEventListener('mouseleave', function() {
                sidebarTimeout = setTimeout(hideSidebar, 300);
            });

            document.addEventListener('click', function(e) {
                if (!sidebar.contains(e.target) && !e.target.matches('.sidebar-toggle')) {
                    hideSidebar();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hideSidebar();
                }
            });
        });
    </script>

</body>
</html>
