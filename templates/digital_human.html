<!-- templates/digital_human.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策数字人助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        /* 左侧：数字人 */
        .avatar-section {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .avatar-container {
            width: 300px;
            height: 400px;
            position: relative;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
            background: #f5f5f5;
            transition: all 0.3s;
        }
        
        .speech-bubble {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 300px;
            min-width: 200px;
            display: none;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 10px solid transparent;
            border-top-color: white;
        }
        
        .avatar-status {
            margin-top: 20px;
            padding: 10px 20px;
            background: #e3f2fd;
            border-radius: 20px;
            font-size: 14px;
            color: #1976d2;
        }
        
        /* 右侧：问答区域 */
        .qa-section {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.5;
        }
        
        .user-message {
            background: #e3f2fd;
            margin-left: auto;
            text-align: right;
        }
        
        .bot-message {
            background: #f5f5f5;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #question-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        #send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .quick-questions {
            margin-top: 20px;
        }
        
        .quick-btn {
            margin: 5px;
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .control-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .nav-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }
        
        @keyframes talk {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }
        
        @keyframes nod {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
        
        @keyframes shake {
            0% { transform: rotate(0deg); }
            33% { transform: rotate(-5deg); }
            66% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
        
        .talking { animation: talk 0.5s infinite; }
        .nodding { animation: nod 0.5s; }
        .shaking { animation: shake 0.5s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：数字人 -->
        <div class="avatar-section">
            <h2>🤖 政策数字人助手</h2>
            <div class="avatar-container">
                <div id="speech-bubble" class="speech-bubble">
                    <p id="speech-text">您好！请问有什么政策问题？</p>
                </div>
                <img id="avatar" src="{{ url_for('static', filename='avatar.png') }}" 
                     alt="数字人助手" class="avatar">
            </div>
            <div class="avatar-status" id="avatar-status">状态: 待命中</div>
            
            <div class="control-panel">
                <h4>表情控制</h4>
                <button onclick="animateAvatar('nod')">点头</button>
                <button onclick="animateAvatar('shake')">摇头</button>
                <button onclick="animateAvatar('talking')">说话</button>
                <button onclick="animateAvatar('thinking')">思考</button>
            </div>
        </div>
        
        <!-- 右侧：问答区域 -->
        <div class="qa-section">
            <h2>💬 政策问答</h2>
            
            <div class="chat-container" id="chat-container">
                <div class="message bot-message">
                    <strong>数字人助手：</strong><br>
                    您好！我是政策解读数字人助手，可以为您提供专业的政策咨询服务。
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="question-input" placeholder="请输入您的问题...">
                <button id="send-btn" onclick="sendQuestion()">发送</button>
            </div>
            
            <div class="quick-questions">
                <p>快捷提问：</p>
                <button class="quick-btn" onclick="quickAsk('高新技术企业有什么税收优惠？')">高新技术企业</button>
                <button class="quick-btn" onclick="quickAsk('研发费用如何加计扣除？')">研发费用</button>
                <button class="quick-btn" onclick="quickAsk('小微企业有哪些税收政策？')">小微企业</button>
            </div>
            
            <a href="/" class="nav-back">返回主页</a>
        </div>
    </div>

    <script>
        // 数字人状态
        let avatarState = 'idle';
        let currentAudio = null;
        
        // 获取DOM元素
        const avatar = document.getElementById('avatar');
        const speechBubble = document.getElementById('speech-bubble');
        const speechText = document.getElementById('speech-text');
        const avatarStatus = document.getElementById('avatar-status');
        const chatContainer = document.getElementById('chat-container');
        
        // 更新数字人状态
        function updateAvatarStatus(status, message = '') {
            avatarState = status;
            const statusMessages = {
                'idle': '待命中',
                'talking': '正在说话',
                'thinking': '正在思考',
                'listening': '正在聆听'
            };
            
            avatarStatus.textContent = `状态: ${statusMessages[status] || status}`;
            
            if (message) {
                speechText.textContent = message;
                speechBubble.style.display = 'block';
                
                // 3秒后隐藏气泡
                setTimeout(() => {
                    if (avatarState === 'talking') return;
                    speechBubble.style.display = 'none';
                }, 3000);
            }
        }
        
        // 数字人动画
        function animateAvatar(animation) {
            avatar.className = 'avatar';
            
            switch(animation) {
                case 'talking':
                    avatar.classList.add('talking');
                    updateAvatarStatus('talking');
                    break;
                case 'thinking':
                    avatar.classList.add('nodding');
                    updateAvatarStatus('thinking');
                    setTimeout(() => avatar.classList.remove('nodding'), 500);
                    break;
                case 'nod':
                    avatar.classList.add('nodding');
                    setTimeout(() => avatar.classList.remove('nodding'), 500);
                    break;
                case 'shake':
                    avatar.classList.add('shaking');
                    setTimeout(() => avatar.classList.remove('shaking'), 500);
                    break;
                default:
                    avatar.classList.remove('talking', 'nodding', 'shaking');
                    updateAvatarStatus('idle');
            }
        }
        
        // 播放语音
        function playSpeech(text) {
            // 停止当前语音
            if (currentAudio) {
                currentAudio.pause();
            }
            
            // 更新数字人状态
            updateAvatarStatus('talking', text);
            animateAvatar('talking');
            
            // 发送到后端生成语音
            fetch('/api/digital_human/speak', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            })
            .then(response => response.json())
            .then(data => {
                if (data.audio_url) {
                    // 播放音频
                    currentAudio = new Audio(data.audio_url);
                    currentAudio.play();
                    
                    // 音频播放结束
                    currentAudio.onended = () => {
                        animateAvatar('idle');
                        updateAvatarStatus('idle');
                    };
                } else {
                    // 如果没有语音，3秒后停止说话动画
                    setTimeout(() => {
                        animateAvatar('idle');
                        updateAvatarStatus('idle');
                    }, 3000);
                }
            });
        }
        
        // 添加消息到聊天框
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = isUser ? 'message user-message' : 'message bot-message';
            messageDiv.innerHTML = `<strong>${isUser ? '您' : '数字人助手'}：</strong><br>${text}`;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 快速提问
        function quickAsk(question) {
            document.getElementById('question-input').value = question;
            sendQuestion();
        }
        
        // 发送问题
        function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) return;
            
            // 添加到聊天框
            addMessage(question, true);
            input.value = '';
            
            // 显示思考状态
            updateAvatarStatus('thinking', '正在思考中...');
            animateAvatar('thinking');
            
            // 发送到后端
            fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: question})
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    addMessage('错误: ' + data.error, false);
                } else {
                    // 显示回答
                    addMessage(data.answer, false);
                    
                    // 让数字人说话
                    playSpeech(data.answer);
                }
            })
            .catch(error => {
                addMessage('请求失败，请重试', false);
                animateAvatar('idle');
            });
        }
        
        // 初始状态
        updateAvatarStatus('idle', '您好！请问有什么政策问题？');
        
        // 监听回车键
        document.getElementById('question-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendQuestion();
        });
    </script>
</body>
</html>
