<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 2rem; color: #1890ff; margin: 10px 0; }
        .table-container { background: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: bold; }
        .back-link { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #1890ff; color: white; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>管理面板</h1>
        <p>用户: {{ username }}</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number">{{ user_count }}</div>
            <div>用户数</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">{{ policy_count }}</div>
            <div>政策数</div>
        </div>
        <div class="stat-card">
            <div class="stat-number">{{ query_count }}</div>
            <div>总查询数</div>
        </div>
    </div>
    
    <div class="table-container">
        <h2>最近查询记录</h2>
        <table>
            <thead>
                <tr>
                    <th>用户</th>
                    <th>问题</th>
                    <th>回答</th>
                    <th>时间</th>
                </tr>
            </thead>
            <tbody>
                {% for query in queries %}
                <tr>
                    <td>{{ query[0] }}</td>
                    <td>{{ query[1] }}</td>
                    <td>{{ query[2][:50] }}{% if query[2]|length > 50 %}...{% endif %}</td>
                    <td>{{ query[3] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <a href="/" class="back-link">返回首页</a>
</body>
</html>
