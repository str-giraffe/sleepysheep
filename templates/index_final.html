<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策解读系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar {
            background: white;
            padding: 0 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 20px; font-weight: bold; color: #1890ff; }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-info a { color: #666; text-decoration: none; }
        .user-info a:hover { color: #1890ff; }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .chat-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 24px;
        }
        .chat-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .message {
            margin: 12px 0;
            padding: 12px 16px;
            border-radius: 6px;
            line-height: 1.5;
            max-width: 80%;
        }
        .user-message {
            background: #e6f7ff;
            margin-left: auto;
            border: 1px solid #91d5ff;
        }
        .bot-message {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #question-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 16px;
        }
        #question-input:focus {
            outline: none;
            border-color: #1890ff;
        }
        #send-btn {
            padding: 0 24px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        #send-btn:hover {
            background: #40a9ff;
        }
        .quick-questions {
            margin-top: 20px;
        }
        .quick-questions p {
            color: #666;
            margin-bottom: 10px;
        }
        .quick-btn {
            margin: 0 8px 8px 0;
            padding: 6px 12px;
            background: #fafafa;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .quick-btn:hover {
            background: #f5f5f5;
            border-color: #1890ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">政策解读系统</div>
        <div class="user-info">
            <span>欢迎, {{ username }}</span>
            {% if role == "admin" %}
            <a href="/admin">管理面板</a>
            {% endif %}
            <a href="/profile">个人中心</a>
            <a href="/logout">退出</a>
        </div>
    </div>
    
    <div class="container">
        <div class="chat-container">
            <div class="chat-title">政策问答助手</div>
            
            <div class="chat-box" id="chat-box">
                <div class="message bot-message">您好！我是政策解读助手，可以回答您关于高新技术企业、税收优惠、人才政策等方面的问题。</div>
            </div>
            
            <div class="input-area">
                <input type="text" id="question-input" placeholder="请输入您的问题...">
                <button id="send-btn">提问</button>
            </div>
            
            <div class="quick-questions">
                <p>快捷提问：</p>
                <button class="quick-btn" onclick="askQuestion('高新技术企业有什么税收优惠？')">高新技术企业</button>
                <button class="quick-btn" onclick="askQuestion('研发费用如何加计扣除？')">研发费用</button>
                <button class="quick-btn" onclick="askQuestion('小微企业有哪些税收政策？')">小微企业</button>
                <button class="quick-btn" onclick="askQuestion('人才引进有什么补贴？')">人才引进</button>
            </div>
        </div>
    </div>

    <script>
        function addMessage(text, isUser) {
            const chatBox = document.getElementById('chat-box');
            const message = document.createElement('div');
            message.className = isUser ? 'message user-message' : 'message bot-message';
            message.textContent = text;
            chatBox.appendChild(message);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function askQuestion(question) {
            if (!question) return;
            
            document.getElementById('question-input').value = question;
            sendQuestion();
        }
        
        function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) return;
            
            addMessage(question, true);
            input.value = '';
            
            fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ question: question })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addMessage(data.answer, false);
                } else {
                    addMessage('错误: ' + data.error, false);
                }
            })
            .catch(error => {
                addMessage('请求失败，请重试', false);
            });
        }
        
        document.getElementById('send-btn').addEventListener('click', sendQuestion);
        document.getElementById('question-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendQuestion();
        });
    </script>
</body>
</html>
