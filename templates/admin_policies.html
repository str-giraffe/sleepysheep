<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政策管理 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>📚 政策管理</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>📝 添加政策文件</h2>
                <form id="addPolicyForm" onsubmit="addPolicy(event)">
                    <div class="form-group">
                        <label>政策标题 *</label>
                        <input type="text" id="title" required placeholder="请输入政策标题">
                    </div>
                    <div class="form-group">
                        <label>政策分类</label>
                        <select id="category_id" class="form-control">
                            <option value="">请选择分类</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>政策标签</label>
                        <input type="text" id="tags" placeholder="请输入标签，多个标签用逗号分隔">
                    </div>
                    <div class="form-group">
                        <label>政策内容 *</label>
                        <textarea id="content" required placeholder="请输入政策内容" rows="6"></textarea>
                    </div>
                    <div class="form-group">
                        <label>来源链接</label>
                        <input type="url" id="source_url" placeholder="请输入政策来源链接（可选）">
                    </div>
                    <div class="form-group">
                        <label>发布日期</label>
                        <input type="date" id="publish_date">
                    </div>
                    <button type="submit" class="btn">添加政策</button>
                </form>
            </div>

            <div class="card">
                <h2>📚 政策文件列表</h2>
                <div class="filter-section" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: end;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label style="font-size: 14px; margin-bottom: 5px; display: block;">按分类查询</label>
                            <select id="filterCategory" class="form-control" onchange="loadPolicies(1)">
                                <option value="">全部分类</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label style="font-size: 14px; margin-bottom: 5px; display: block;">按时间查询</label>
                            <select id="filterTime" class="form-control" onchange="loadPolicies(1)">
                                <option value="">全部时间</option>
                                <option value="today">今天</option>
                                <option value="week">最近一周</option>
                                <option value="month">最近一个月</option>
                                <option value="quarter">最近三个月</option>
                                <option value="year">最近一年</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 0; grid-column: 1 / -1;">
                            <label style="font-size: 14px; margin-bottom: 5px; display: block;">自定义时间范围</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="date" id="filterStartDate" class="form-control" style="flex: 1;" onchange="loadPolicies(1)">
                                <span style="line-height: 38px; white-space: nowrap;">至</span>
                                <input type="date" id="filterEndDate" class="form-control" style="flex: 1;" onchange="loadPolicies(1)">
                                <button class="btn" onclick="resetFilters()" style="height: 38px; min-width: 80px;">重置</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="policyList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
                <div id="pagination" class="pagination" style="margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const perPage = 10;
        
        async function loadPolicies(page = 1) {
            try {
                currentPage = page;
                const categoryId = document.getElementById('filterCategory').value;
                const timeFilter = document.getElementById('filterTime').value;
                const startDate = document.getElementById('filterStartDate').value;
                const endDate = document.getElementById('filterEndDate').value;
                
                const params = new URLSearchParams();
                if (categoryId) params.append('category_id', categoryId);
                if (timeFilter) params.append('time_filter', timeFilter);
                if (startDate) params.append('start_date', startDate);
                if (endDate) params.append('end_date', endDate);
                params.append('page', page);
                params.append('per_page', perPage);
                
                const response = await fetch('/api/policies?' + params.toString());
                const data = await response.json();
                const policies = data.policies || [];
                const pagination = data.pagination || {};
                const listDiv = document.getElementById('policyList');
                
                if (policies.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">暂无符合条件的政策文件。</div>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                listDiv.innerHTML = policies.map(policy => `
                    <div class="policy-item">
                        <h3>${escapeHtml(policy.title)}</h3>
                        <div class="meta">
                            创建时间：${policy.created_at}
                            ${policy.publish_date ? ' | 发布日期：' + policy.publish_date : ''}
                            ${policy.topic ? ' | 主题：' + policy.topic : ''}
                            ${policy.source ? ' | 来源：' + policy.source : ''}
                        </div>
                        <div class="content-preview">${escapeHtml(policy.content.substring(0, 200))}${policy.content.length > 200 ? '...' : ''}</div>
                        <div class="actions">
                            <button class="btn btn-danger btn-sm" onclick="deletePolicy(${policy.id})">删除</button>
                        </div>
                    </div>
                `).join('');
                
                // 渲染分页
                renderPagination(pagination);
            } catch (error) {
                showMessage('加载政策列表失败：' + error.message, 'error');
            }
        }
        
        function renderPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            const { page, total_pages, total, has_prev, has_next } = pagination;
            
            if (total_pages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = `
                <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                    <span style="color: #666; margin-right: 10px;">共 ${total} 条，${total_pages} 页</span>
            `;
            
            // 上一页按钮
            if (has_prev) {
                html += `<button class="btn" onclick="loadPolicies(${page - 1})" style="padding: 5px 12px;">上一页</button>`;
            } else {
                html += `<button class="btn" disabled style="padding: 5px 12px; opacity: 0.5; cursor: not-allowed;">上一页</button>`;
            }
            
            // 页码按钮
            const maxButtons = 5;
            let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
            let endPage = Math.min(total_pages, startPage + maxButtons - 1);
            
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            
            if (startPage > 1) {
                html += `<button class="btn" onclick="loadPolicies(1)" style="padding: 5px 12px;">1</button>`;
                if (startPage > 2) {
                    html += `<span style="padding: 5px;">...</span>`;
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                if (i === page) {
                    html += `<button class="btn" style="padding: 5px 12px; background: #c41230; color: white;">${i}</button>`;
                } else {
                    html += `<button class="btn" onclick="loadPolicies(${i})" style="padding: 5px 12px;">${i}</button>`;
                }
            }
            
            if (endPage < total_pages) {
                if (endPage < total_pages - 1) {
                    html += `<span style="padding: 5px;">...</span>`;
                }
                html += `<button class="btn" onclick="loadPolicies(${total_pages})" style="padding: 5px 12px;">${total_pages}</button>`;
            }
            
            // 下一页按钮
            if (has_next) {
                html += `<button class="btn" onclick="loadPolicies(${page + 1})" style="padding: 5px 12px;">下一页</button>`;
            } else {
                html += `<button class="btn" disabled style="padding: 5px 12px; opacity: 0.5; cursor: not-allowed;">下一页</button>`;
            }
            
            html += '</div>';
            paginationDiv.innerHTML = html;
        }
        
        function resetFilters() {
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterTime').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            currentPage = 1;
            loadPolicies(1);
        }

        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();
                const selectElement = document.getElementById('category_id');
                const filterCategorySelect = document.getElementById('filterCategory');
                
                selectElement.innerHTML = '<option value="">请选择分类</option>';
                filterCategorySelect.innerHTML = '<option value="">全部分类</option>';
                
                // 确保包含所需的分类
                const requiredCategories = ['教育', '医疗', '就业', '住房', '社保', '税收', '创业', '其他'];
                const existingCategoryNames = categories.map(c => c.name);
                
                requiredCategories.forEach(categoryName => {
                    if (!existingCategoryNames.includes(categoryName)) {
                        // 如果分类不存在，添加到数据库
                        addCategoryIfNotExists(categoryName);
                    }
                });
                
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category.id;
                    option.textContent = category.name;
                    selectElement.appendChild(option);
                    
                    const filterOption = document.createElement('option');
                    filterOption.value = category.id;
                    filterOption.textContent = category.name;
                    filterCategorySelect.appendChild(filterOption);
                });
            } catch (error) {
                showMessage('加载分类列表失败：' + error.message, 'error');
            }
        }
        
        async function addCategoryIfNotExists(name) {
            try {
                await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
            } catch (error) {
                console.log('添加分类失败：', error);
            }
        }

        async function addPolicy(event) {
            event.preventDefault();
            
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const source_url = document.getElementById('source_url').value.trim();
            const publish_date = document.getElementById('publish_date').value;
            const category_id = document.getElementById('category_id').value;
            const tagsInput = document.getElementById('tags').value.trim();
            
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];

            try {
                const response = await fetch('/api/policies', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title, content, source_url: source_url || null,
                        publish_date: publish_date || null,
                        category_id: category_id || null, tags
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    document.getElementById('addPolicyForm').reset();
                    loadPolicies();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('添加失败：' + error.message, 'error');
            }
        }

        async function deletePolicy(policyId) {
            if (!confirm('确定要删除这条政策吗？')) return;

            try {
                const response = await fetch('/api/policies/' + policyId, { method: 'DELETE' });
                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    loadPolicies();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('删除失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadCategories();
        loadPolicies();
    </script>
</body>
</html>
