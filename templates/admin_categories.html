<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 管理后台</title>
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h3>功能导航</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">×</button>
            </div>
            <ul class="sidebar-nav">
                <li><a href="/">政策问答</a></li>
                <li><a href="/profile">个人中心</a></li>
                <li><a href="/forum">讨论广场</a></li>
                <li><a href="/admin" class="active">管理后台</a></li>
                <li><a href="/logout">登出</a></li>
            </ul>
        </div>
    </div>

    <div class="main-container">
        <div class="header">
            <h1>🏷️ 分类管理</h1>
            <a href="/admin" class="btn" style="margin-left: auto;">← 返回后台首页</a>
        </div>
        <div class="container">
            <div class="nav">
                {% if user_info %}
                    <div style="display: flex; align-items: center; gap: 15px; justify-content: flex-end;">
                        <span style="color: #333; font-weight: 500;">👤 {{ user_info.nickname or user_info.username }}</span>
                        <a href="/profile">个人中心</a>
                        <a href="/logout" class="logout">登出</a>
                    </div>
                {% endif %}
            </div>
            <div id="message"></div>

            <div class="card">
                <h2>➕ 添加分类</h2>
                <form id="addCategoryForm" onsubmit="addCategory(event)">
                    <div class="form-group">
                        <label>分类名称 *</label>
                        <input type="text" id="categoryName" required placeholder="请输入分类名称">
                    </div>
                    <div class="form-group">
                        <label>分类描述</label>
                        <input type="text" id="categoryDescription" placeholder="请输入分类描述（可选）">
                    </div>
                    <button type="submit" class="btn">添加分类</button>
                </form>
            </div>

            <div class="card">
                <h2>📋 分类列表</h2>
                <div id="categoryList" class="policy-list">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadCategories() {
            try {
                const response = await fetch('/api/categories');
                const categories = await response.json();
                const categoryList = document.getElementById('categoryList');
                
                if (categories.length === 0) {
                    categoryList.innerHTML = '<div class="empty-state">暂无分类，请添加。</div>';
                } else {
                    categoryList.innerHTML = categories.map(category => `
                        <div class="policy-item">
                            <h3>${escapeHtml(category.name)}</h3>
                            <div class="meta">创建时间：${category.created_at}</div>
                            ${category.description ? '<div class="content-preview">' + escapeHtml(category.description) + '</div>' : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                showMessage('加载分类列表失败：' + error.message, 'error');
            }
        }

        async function addCategory(event) {
            event.preventDefault();
            
            const name = document.getElementById('categoryName').value.trim();
            const description = document.getElementById('categoryDescription').value.trim();
            
            try {
                const response = await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description: description || null })
                });

                const data = await response.json();
                if (response.ok) {
                    showMessage(data.message, 'success');
                    document.getElementById('addCategoryForm').reset();
                    loadCategories();
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('添加分类失败：' + error.message, 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '<div class="message ' + type + '">' + escapeHtml(text) + '</div>';
            setTimeout(() => { messageDiv.innerHTML = ''; }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.remove('open');
            setTimeout(() => { sidebar.style.left = '-230px'; }, 10);
        }

        loadCategories();
    </script>
</body>
</html>
